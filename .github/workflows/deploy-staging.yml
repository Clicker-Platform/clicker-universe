name: Deploy to Firebase Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    env:
      IS_WEBPACK_BUILD: "1"
      NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyDk_b_wMPuniEWxYebMB4aLfPb5kBDtLSA"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "clicker-universe-stagging.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "clicker-universe-stagging"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "clicker-universe-stagging.firebasestorage.app"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "603624012885"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:603624012885:web:2098c7fd9b1f06f440e8dc"
      NEXT_PUBLIC_BASE_DOMAIN: "stagging.clicker.id"
      NEXT_PUBLIC_AUTH_GATEWAY_URL: "https://auth.stagging.clicker.id"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build Backyard App
        run: |
          cd backyard
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}" > .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_BASE_DOMAIN=${NEXT_PUBLIC_BASE_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_AUTH_GATEWAY_URL=${NEXT_PUBLIC_AUTH_GATEWAY_URL}" >> .env.production.local
          pnpm install
          pnpm build
          cd ..

      - name: Build Core App (Clicker Platform v2)
        run: |
          cd clicker-platform-v2
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}" > .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_BASE_DOMAIN=${NEXT_PUBLIC_BASE_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_AUTH_GATEWAY_URL=${NEXT_PUBLIC_AUTH_GATEWAY_URL}" >> .env.production.local
          pnpm install
          pnpm build
          cd ..

      - name: Build Auth Gateway
        run: |
          cd auth-gateway
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}" > .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}" >> .env.production.local
          echo "NEXT_PUBLIC_BASE_DOMAIN=${NEXT_PUBLIC_BASE_DOMAIN}" >> .env.production.local
          echo "NEXT_PUBLIC_AUTH_GATEWAY_URL=${NEXT_PUBLIC_AUTH_GATEWAY_URL}" >> .env.production.local
          pnpm install
          pnpm build
          cd ..

      - name: Build Functions
        run: |
          cd functions
          echo "BASE_DOMAIN=${NEXT_PUBLIC_BASE_DOMAIN}" > .env.clicker-universe-stagging
          pnpm install
          pnpm build
          cd ..

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Staging
        run: firebase deploy --project clicker-universe-stagging --non-interactive --force
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
