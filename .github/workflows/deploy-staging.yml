name: Deploy to Firebase Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backyard App
        run: |
          cd backyard
          npm install
          npm run build
          cd ..

      - name: Build Core App (Clicker Platform v2)
        run: |
          cd clicker-platform-v2
          npm install
          npm run build
          cd ..

      - name: Build Auth Gateway
        run: |
          cd auth-gateway
          npm install
          npm run build
          cd ..

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm install
          cd ..
          
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Deploy to Firebase Staging
        # Explicitly targets the staging project
        run: firebase deploy --project clicker-universe-stagging --non-interactive
        env:
          # This token needs to be added to GitHub Secrets
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
