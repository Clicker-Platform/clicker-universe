name: Deploy to Firebase Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyDk_b_wMPuniEWxYebMB4aLfPb5kBDtLSA"
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "clicker-universe-stagging.firebaseapp.com"
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "clicker-universe-stagging"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "clicker-universe-stagging.firebasestorage.app"
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "603624012885"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:603624012885:web:2098c7fd9b1f06f440e8dc"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backyard App
        run: |
          cd backyard
          npm install
          npm run build
          cd ..

      - name: Build Core App (Clicker Platform v2)
        run: |
          cd clicker-platform-v2
          npm install
          npm run build
          cd ..

      - name: Build Auth Gateway
        run: |
          cd auth-gateway
          npm install
          npm run build
          cd ..

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm install
          cd ..
          
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Deploy to Firebase Staging
        # Explicitly targets the staging project and enables web frameworks to support Next.js deploying
        run: firebase deploy --project clicker-universe-stagging --non-interactive
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          # This token needs to be added to GitHub Secrets
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
