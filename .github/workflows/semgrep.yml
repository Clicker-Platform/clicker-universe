name: Semgrep

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep-oss:
    name: Static analysis (OSS)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep OSS
        run: |
          semgrep scan \
            --sarif --output semgrep.sarif \
            --metrics off \
            --config p/default \
            --config p/typescript \
            --config p/javascript \
            --config p/react \
            --config p/nextjs \
            --config p/owasp-top-ten \
            --config p/security-audit

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep-oss

  semgrep-pro:
    name: Static analysis (Pro)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep CI (Pro engine)
        run: semgrep ci
        continue-on-error: true
